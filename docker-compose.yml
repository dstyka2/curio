services:
  curio:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BACKEND_URL: ${BACKEND_URL:-http://localhost:5002}
        PUBLIC_PATH: ${PUBLIC_PATH:-/}
    container_name: ${CURIO_CONTAINER_NAME:-curio}
    tty: true
    stdin_open: true
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "${CURIO_PORT_2000:-2000}:2000"
      - "${CURIO_PORT_5002:-5002}:5002"
      - "${CURIO_PORT_8080:-8080}:8080"
    volumes:
      - ./packages:/app/packages
      # Share sandbox .data files with the host so Playwright (runs on host in CI) can read them
      - ./.curio:/app/.curio
      # Persist the Flask SQLite DB (users, projects, sessions) across container recreates
      - ./instance:/app/instance